<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Creative Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #0a0a0b;
        --card-bg: #111114;
        --text-main: #f3f4f6;
        --text-muted: #9ca3af;
        --font-sans: 'Inter', sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        font-family: var(--font-sans);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      ::selection {
        background-color: rgba(99, 102, 241, 0.3);
        color: #c7d2fe;
      }

      .background-effects {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }

      .bg-glow-1 {
        position: absolute;
        top: -10%; left: -10%;
        width: 40%; height: 40%;
        border-radius: 50%;
        background: rgba(79, 70, 229, 0.1);
        filter: blur(130px);
      }

      .bg-glow-2 {
        position: absolute;
        bottom: -10%; right: -10%;
        width: 40%; height: 40%;
        border-radius: 50%;
        background: rgba(13, 148, 136, 0.1);
        filter: blur(130px);
      }

      .container {
        position: relative;
        z-index: 10;
        max-width: 1280px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
        width: 100%;
      }
      @media (min-width: 768px) {
        .container { padding-top: 3rem; padding-bottom: 3rem; }
      }

      .header {
        text-align: center;
        margin-bottom: 2rem;
        animation: fadeInDown 0.6s ease-out;
      }
      @media (min-width: 768px) {
        .header { margin-bottom: 3rem; }
      }

      @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .title {
        font-size: 2.25rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
        letter-spacing: -0.025em;
        line-height: 1.2;
      }
      @media (min-width: 768px) {
        .title { font-size: 3rem; }
      }
      @media (min-width: 1024px) {
        .title { font-size: 3.5rem; }
      }

      .title span {
        background: linear-gradient(to right, #818cf8, #22d3ee);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }

      .subtitle {
        font-size: 1rem;
        color: var(--text-muted);
        max-width: 42rem;
        margin: 0 auto;
        line-height: 1.6;
        font-weight: 500;
      }
      @media (min-width: 768px) {
        .subtitle { font-size: 1.125rem; }
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
      @media (min-width: 768px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 1.5rem;
        }
      }
      @media (min-width: 1024px) {
        .grid { gap: 2rem; }
      }

      .card {
        position: relative;
        background-color: var(--card-bg);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 1rem;
        overflow: hidden;
        text-decoration: none;
        display: flex;
        flex-direction: column;
        transition: all 0.5s ease;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        animation: fadeInUp 0.6s ease-out backwards;
      }

      .card:hover {
        border-color: rgba(255,255,255,0.15);
        transform: translateY(-4px);
        box-shadow: 0 25px 30px -12px rgba(0, 0, 0, 0.7), 0 0 20px rgba(79, 70, 229, 0.1);
      }

      .card-top-bar {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 4px;
        opacity: 0.8;
        transition: opacity 0.3s ease;
        z-index: 50;
      }
      .card:hover .card-top-bar {
        opacity: 1;
      }

      .thumbnail-container {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background-color: rgba(31, 41, 55, 0.4);
        overflow: hidden;
      }

      .thumbnail-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top;
        opacity: 0;
        transform: scale(1.05);
        transition: opacity 1s ease, transform 1s ease;
        position: relative;
        z-index: 10;
      }

      .thumbnail-image.loaded {
        opacity: 1;
        transform: scale(1);
      }

      .thumbnail-placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: rgba(17, 24, 39, 0.6);
        z-index: 0;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
      }

      .thumbnail-gradient {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(17, 17, 20, 0.95) 0%, rgba(17, 17, 20, 0.4) 60%, transparent 100%);
        pointer-events: none;
        z-index: 20;
      }

      .card-content {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 1.5rem;
        z-index: 30;
        pointer-events: none;
      }
      @media (min-width: 768px) {
        .card-content { padding: 2rem; }
      }

      .card-content-inner {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        pointer-events: auto;
      }

      .card-text-wrapper {
        transform: translateY(8px);
        transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .card:hover .card-text-wrapper {
        transform: translateY(0);
      }

      .card-title-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.625rem;
      }

      .card-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
      }

      .card-title {
        font-size: 1.25rem;
        font-weight: 700;
        color: #f3f4f6;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        transition: color 0.3s ease;
      }
      .card:hover .card-title {
        color: white;
      }
      @media (min-width: 768px) {
        .card-title { font-size: 1.5rem; }
      }

      .card-description {
        font-size: 0.875rem;
        color: #d1d5db;
        font-weight: 500;
        opacity: 0.9;
        text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      @media (min-width: 768px) {
        .card-description { font-size: 1rem; }
      }

      .card-link-icon-wrapper {
        flex-shrink: 0;
        margin-top: 0.25rem;
      }

      .card-link-icon {
        width: 40px; height: 40px;
        border-radius: 50%;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        backdrop-filter: blur(8px);
        transition: all 0.3s ease;
      }
      .card:hover .card-link-icon {
        background: white;
        color: #111827;
        transform: scale(1.1);
      }

      .footer {
        text-align: center;
        padding-bottom: 2.5rem;
        font-size: 0.75rem;
        color: #4b5563;
        font-weight: 500;
        letter-spacing: 0.05em;
        animation: fadeIn 1s ease-out 0.8s backwards;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      .icon-svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
      @media (min-width: 768px) {
        .icon-svg { width: 20px; height: 20px; }
      }
    </style>
  </head>
  <body>

      COPYRIGHT © <span id="year"></span> 3D SERVICE PORTAL. ALL RIGHTS RESERVED.
    </footer>-->

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const yearElement = document.getElementById('year');
        if (yearElement) {
          yearElement.textContent = new Date().getFullYear();
        }
      });
    </script>
  </body>
</html>
